name: ResolveKitSample
options:
  minimumXcodeGenVersion: 2.45.0
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: app.resolvekit.sample.ios
    IPHONEOS_DEPLOYMENT_TARGET: 16.0
    SWIFT_VERSION: 5.9
targets:
  ResolveKitSample:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - Sources
    info:
      path: Sources/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
        CFBundleDisplayName: ResolveKit Sample
        # Allow plain HTTP for staging/local dev environments
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_NAME: ResolveKitSample
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/Info.plist
        SUPPORTS_MACCATALYST: YES
    dependencies:
      - package: resolvekit-ios-sdk
        product: ResolveKitUI
        embed: true
        codeSign: true
      - package: resolvekit-ios-sdk
        product: ResolveKitAuthoring
packages:
  resolvekit-ios-sdk:
    path: ../..
