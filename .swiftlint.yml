# SwiftLint Configuration
# https://github.com/realm/SwiftLint

# Rules to enable
opt_in_rules:
  - empty_count
  - closure_spacing
  - overridden_super_call
  - private_outlet
  - prohibited_super_call
  - first_where
  - fatal_error_message
  - vertical_parameter_alignment_on_call
  - let_var_whitespace
  - unowned_variable_capture
  - sorted_imports
  - operator_usage_whitespace
  - closure_end_indentation
  - contains_over_first_not_nil
  - empty_string
  - discouraged_object_literal
  - nimble_operator
  - number_separator
  - file_header
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces

# Rules to disable
disabled_rules:
  - trailing_whitespace
  - todo
  - identifier_name
  - line_length
  - type_body_length
  - function_body_length
  - file_length
  - cyclomatic_complexity
  - nesting
  - large_tuple

# Configuration
excluded:
  - Pods
  - .build
  - Tests
  - Example

line_length:
  warning: 150
  error: 200
  ignores_comments: true
  ignores_urls: true

type_name:
  min_length: 2
  max_length: 50

identifier_name:
  min_length: 2
  excluded:
    - id
    - x
    - y
    - z
